name: CI

on:
  push:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v7

      - name: Install dependencies
        run: uv sync

      - name: Lint Python code
        # uses: astral-sh/ruff-action@v3
        run: |
          uv add pylint && uv run pylint app.py sensebox_service.py

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Run unit tests
        run: uv run pytest -v

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          push: false
          tags: hivebox:${{ github.sha }}

      - name: Run container
        run: |
          docker run -d -p 8000:8000 --name hivebox hivebox:${{ github.sha }}

      - name: Test /version endpoint
        run: |
          echo "Waiting for API to start..."
          until curl -s http://localhost:8000/version > /dev/null; do
            sleep 1
          done

          EXPECTED_VERSION=$(grep '^version' pyproject.toml | cut -d '"' -f2)
          API_VERSION=$(curl -s http://localhost:8000/version | jq -r '.version')

          if [[ "$API_VERSION" != "$EXPECTED_VERSION" ]]; then
              echo "Version mismatch: expected $EXPECTED_VERSION but got $API_VERSION"
              exit 1
          fi

      - name: Stop container
        run: docker stop hivebox
