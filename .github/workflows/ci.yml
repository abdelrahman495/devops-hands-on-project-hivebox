name: CI

on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-24.04

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594 # v2.16.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0

      - name: Install dependencies
        run: uv sync

      - name: Lint Python code
        # uses: astral-sh/ruff-action@v3
        run: |
          uv add pylint && uv run pylint app.py sensebox_service.py

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: Dockerfile

      - name: Run unit tests
        run: uv run pytest -v

      - name: Build Docker image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6.19.2
        with:
          push: false
          tags: hivebox:${{ github.sha }}

      - name: Run container
        run: |
          docker run -d -p 8000:8000 --name hivebox hivebox:${{ github.sha }}

      - name: Test /version endpoint
        run: |
          echo "Waiting for API to start..."
          until curl -s http://localhost:8000/version > /dev/null; do
            sleep 1
          done

          EXPECTED_VERSION=$(grep '^version' pyproject.toml | cut -d '"' -f2)
          API_VERSION=$(curl -s http://localhost:8000/version | jq -r '.version')

          if [[ "$API_VERSION" != "$EXPECTED_VERSION" ]]; then
              echo "Version mismatch: expected $EXPECTED_VERSION but got $API_VERSION"
              exit 1
          fi

      - name: Stop container
        run: docker stop hivebox
