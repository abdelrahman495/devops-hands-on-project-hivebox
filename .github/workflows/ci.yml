name: CI

on:
  push:
    branches:
      - main
      - "phase-*"
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Lint Python code
        uses: astral-sh/ruff-action@0ce1b0bf8b818ef400413f810f8a11cdbda0034b # v4.0.0

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: Dockerfile

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run unit tests
        run: uv run pytest -vm unit

  docker:
    name: Docker
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [lint, unit-tests]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0

      - name: Build Docker image
        uses: docker/build-push-action@bcafcacb16a39f128d818304e6c9c0c18556b85f # v7.1.0
        with:
          push: false
          tags: hivebox:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container
        run: |
          docker run -d -p 8000:8000 --name hivebox hivebox:${{ github.sha }}

      - name: Test /version endpoint
        run: |
          echo "Waiting for API to start..."
          timeout 30 bash -c 'until curl -sf --max-time 2 http://localhost:8000/version; do sleep 1; done'

          EXPECTED_VERSION=$(grep '^version' pyproject.toml | cut -d '"' -f2)
          API_VERSION=$(curl -s http://localhost:8000/version | jq -r '.version')

          if [[ "$API_VERSION" != "$EXPECTED_VERSION" ]]; then
              echo "Version mismatch: expected $EXPECTED_VERSION but got $API_VERSION"
              exit 1
          fi

      - name: Dump container logs on failure
        if: failure()
        run: docker logs hivebox

      - name: Remove container
        if: always()
        run: docker rm -f hivebox

  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    needs: [lint, unit-tests]
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@f808768d1510423e83855289c910610ca9b43176 # v2.17.0
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@cec208311dfd045dd5311c1add060b2062131d57 # v8.0.0

      - name: Install dependencies
        run: uv sync --frozen --group dev

      - name: Run integration tests
        run: uv run pytest -vm integration
